spring.application.name=ARCOS
spring.main.banner-mode=off

# Charge la config locale generee par le wizard (gitignored, non obligatoire)
spring.config.import=optional:file:./application-local.yaml

# Configuration Audio
# Index du device audio d'entree (-1 = auto-selection)
arcos.audio.input-device-index=-1
# Frequence d'echantillonnage du microphone (Hz)
arcos.audio.sample-rate=44100
# Seuil RMS en-dessous duquel l'audio est considere comme silence
arcos.audio.silence-threshold=1000
# Duree de silence en ms avant arret de l'enregistrement
arcos.audio.silence-duration-ms=1200
# Duree maximale d'enregistrement en secondes
arcos.audio.max-recording-seconds=30
# Mode conversation multi-tours : fenetre d'ecoute post-reponse
arcos.audio.multi-turn-enabled=true
arcos.audio.post-response-listening-window-ms=4000
arcos.audio.conversation-silence-ms=1500

# Configuration Personnalite
# Profil de personnalite : CALCIFER, K2SO, GLADOS, DEFAULT
arcos.personality.profile=CALCIFER
# Seuil d'intensite pour creer/mettre a jour une opinion
arcos.personality.opinion-threshold=0.5
# Seuil de similarite cosinus pour regrouper deux opinions (0.0 - 1.0)
arcos.personality.opinion-similarity-threshold=0.85
# TopK lors de la recherche d'opinions similaires
arcos.personality.opinion-search-topk=10
# Seuil de haute intensite de desir (declenchement d'initiatives)
arcos.personality.desire-high-threshold=0.8
# Seuil de basse intensite de desir
arcos.personality.desire-low-threshold=0.3
# Intensite minimale d'opinion pour creer un desir
arcos.personality.desire-create-threshold=0.5
# Intensite minimale pour qu'un desir passe en statut PENDING
arcos.personality.desire-pending-threshold=0.7
# Facteur de lissage lors de la mise a jour de l'intensite d'un desir
arcos.personality.desire-smoothing-factor=0.7
# Intensite minimale d'un desir pour declencher une initiative autonome
arcos.personality.initiative-threshold=0.8
# Heure minimale (incluse) avant laquelle aucune initiative n'est declenchee
arcos.personality.initiative-no-initiative-until-hour=9
# Intervalle de verification des initiatives (ms) — configurable sans recompilation
arcos.personality.initiative-check-interval-ms=3600000

# Homeostasie PAD
# Facteur de decroissance exponentielle vers la baseline PAD par cycle (0.0-1.0)
arcos.personality.mood-decay-factor=0.95
# Facteur d ajustement du seuil d initiative par le Plaisir PAD
arcos.personality.mood-initiative-factor=0.15
# Poids de l activation (Arousal) sur la volatilite des opinions
arcos.personality.mood-opinion-activation-weight=0.5

# Baselines PAD par profil
arcos.personality.mood-baseline.calcifer.pleasure=0.3
arcos.personality.mood-baseline.calcifer.arousal=0.2
arcos.personality.mood-baseline.calcifer.dominance=0.1
arcos.personality.mood-baseline.k2so.pleasure=-0.1
arcos.personality.mood-baseline.k2so.arousal=0.1
arcos.personality.mood-baseline.k2so.dominance=0.0
arcos.personality.mood-baseline.glados.pleasure=-0.2
arcos.personality.mood-baseline.glados.arousal=0.0
arcos.personality.mood-baseline.glados.dominance=0.3
arcos.personality.mood-baseline.default.pleasure=0.0
arcos.personality.mood-baseline.default.arousal=0.0
arcos.personality.mood-baseline.default.dominance=0.0

# Hyperparametres du modele d opinions
arcos.personality.opinion.weight-experience=0.70
arcos.personality.opinion.weight-coherence=0.30
arcos.personality.opinion.reinforce-base=0.05
arcos.personality.opinion.contradict-base=0.08
arcos.personality.opinion.stability-growth=0.02
arcos.personality.opinion.stability-shrink=0.03
arcos.personality.opinion.rho-network=0.25

# Configuration Mistral
spring.ai.mistralai.api-key=${MISTRALAI_API_KEY}

#mistral-medium-2508
spring.ai.mistralai.chat.options.model=mistral-large-2512

spring.ai.retry.on-client-errors = true
spring.ai.retry.max-attempts = 100
spring.ai.retry.backoff.initial-interval = 5000ms

# Configuration du rate Limiter
resilience4j.ratelimiter.instances.mistral_free.limit-for-period=1
resilience4j.ratelimiter.instances.mistral_free.limit-refresh-period=1s
resilience4j.ratelimiter.instances.mistral_free.timeout-duration=1500ms

# Configuration du module memory (6333 for http, 6334 for http2)
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6334}
memory.embedding.dimension=${EMBEDDING_DIMENSION:1024}

# Configuration Qdrant
# Dimension des vecteurs d'embedding (doit correspondre au module d'embedding)
arcos.qdrant.embedding-dimension=${EMBEDDING_DIMENSION:1024}
# Metrique de distance : COSINE, EUCLID, DOT, MANHATTAN
arcos.qdrant.distance-metric=COSINE
# Retry connexion au demarrage
arcos.qdrant.max-retries=6
arcos.qdrant.initial-backoff-ms=1000
arcos.qdrant.max-backoff-ms=30000

# Injection passive de memoire long-terme (QuestionAnswerAdvisor)
# Nombre de souvenirs injectes par tour conversationnel
arcos.memory.advisor.top-k=3

# Résumé roulant de conversation (ConversationSummaryService)
# Nombre de messages bruts recents conserves apres le resume
arcos.conversation.summary.recent-messages-count=3

# Configuration Recherche Web
# Nombre de resultats retournes par la recherche Brave
arcos.search.brave-result-count=5

# Configuration Actions Planifiees
# Chemin du fichier JSON de persistance des actions planifiees
arcos.planned-action.storage-path=data/planned-actions.json
# Chemin du fichier JSON de persistance de l'historique d'execution
arcos.planned-action.history-storage-path=data/execution-history.json
# Taille du pool de threads du scheduler
arcos.planned-action.thread-pool-size=2
# Nombre max de tentatives pour generer un plan d'execution via LLM
arcos.planned-action.max-plan-retries=3
# Nombre par defaut de resultats calendrier dans les plans d'execution
arcos.planned-action.default-calendar-max-results=5

# Configuration de qdrant vector store
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}


# Logging configuration
logging.level.root=INFO
logging.level.Orchestrator=DEBUG

# Web Page Reader
arcos.web-page.max-content-length=4000
arcos.web-page.timeout-seconds=15

# Faster Whisper URL
faster-whisper.url=http://localhost:9876

# Circuit breakers sur les outils externes (seuil 50%, fenetre 10 appels, attente 30s)
resilience4j.circuitbreaker.instances.braveSearch.sliding-window-size=10
resilience4j.circuitbreaker.instances.braveSearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.braveSearch.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.braveSearch.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.webPage.sliding-window-size=10
resilience4j.circuitbreaker.instances.webPage.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.webPage.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.webPage.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.weather.sliding-window-size=10
resilience4j.circuitbreaker.instances.weather.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.weather.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.weather.permitted-number-of-calls-in-half-open-state=3

logging.level.io.github.resilience4j=WARN

# ========================
# User Model (Observation Tree)
# ========================
# Active/desactive le module de modelisation utilisateur
arcos.user-model.enabled=true
# Chemin du fichier JSON de persistance de l'arbre
arcos.user-model.storage-path=data/user-tree.json
# Chemin du fichier JSON d'archive des observations prunees
arcos.user-model.archive-path=data/user-tree-archive.json
# Nombre max d'observations actives dans l'arbre
arcos.user-model.max-active-observations=300
# Nombre min de conversations avant injection dans le prompt
arcos.user-model.min-conversations-before-injection=3
# Nom du modele d'embedding local ONNX
arcos.user-model.embedding-model-name=all-MiniLM-L6-v2
# Cron de pruning des observations obsoletes (3h du matin)
arcos.user-model.pruning-cron=0 0 3 * * *
# Seuil minimal de S_rank pour injection on-demand
arcos.user-model.retrieval-min-srank=0.3
# Budget tokens par branche always-injected
arcos.user-model.identity-budget-tokens=25
arcos.user-model.communication-budget-tokens=30
# Budget total max pour le bloc profil utilisateur
arcos.user-model.total-budget-tokens=80
# Alpha EMA cold-start (<5 conversations)
arcos.user-model.ema-alpha-cold-start=0.3
# Alpha EMA stable (>=5 conversations)
arcos.user-model.ema-alpha-stable=0.1
# Seuil de significativite (delta >20%)
arcos.user-model.significance-threshold=0.20
# Sessions consecutives avant declenchement
arcos.user-model.significance-consecutive-sessions=3
# Delai debounce de sauvegarde (ms)
arcos.user-model.debounce-save-ms=500
# Mots de disfluence STT a filtrer
arcos.user-model.disfluence-words=euh,heu,bah,ben,hein,quoi,genre,voila,enfin,donc
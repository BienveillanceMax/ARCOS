version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.11.4
    container_name: qdrant_memory
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: faster-whisper-container
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=deepdml/faster-whisper-large-v3-turbo-ct2
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__TTL=-1
      - PRELOAD_MODELS=["deepdml/faster-whisper-large-v3-turbo-ct2"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  memlistener-init:
    image: ollama/ollama:latest
    container_name: memlistener_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull pierrewagniart/memlistener:q4_k_m"]
    restart: "no"

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: radicale
    ports:
      - "5232:5232"
    volumes:
      - radicale_data:/data
    environment:
      - TAKE_FILE_OWNERSHIP=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/.web"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  arcos-app:
    build:
      context: .
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: arcos_app
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

    tty: true
    stdin_open: true

    env_file:
      - path: .env
        required: false

    network_mode: "host"
    privileged: true

    environment:
      - PULSE_SERVER=unix:/run/user/${UID:-1000}/pulse/native
      - PIPEWIRE_SOCKET=/run/user/${UID:-1000}/pipewire-0
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}
      - PULSE_NO_AUTOSPAWN=1
      # Variables pour D-Bus (nécessaire pour Bluetooth)
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/${UID:-1000}/bus

    volumes:
      - ./src/main/resources/upmc-model:/app/src/main/resources/upmc-model:ro

      # D-Bus - CRITIQUE pour Bluetooth
      - /var/run/dbus:/var/run/dbus
      - /run/user/${UID:-1000}/bus:/run/user/${UID:-1000}/bus

      # PipeWire/PulseAudio
      - /run/user/${UID:-1000}/pipewire-0:/run/user/${UID:-1000}/pipewire-0
      - /run/user/${UID:-1000}/pulse:/run/user/${UID:-1000}/pulse

      # Devices audio
      - /dev/snd:/dev/snd

      # USB pour périphériques Bluetooth USB
      - /dev/bus/usb:/dev/bus/usb

    devices:
      - /dev/snd:/dev/snd

    # Ajouter les groupes nécessaires
    group_add:
      - audio
      - ${BLUETOOTH_GID:-996}  # GID du groupe bluetooth de l'hôte

volumes:
  qdrant_storage:
  ollama_data:
  radicale_data:
